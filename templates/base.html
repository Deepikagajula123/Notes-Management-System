<!DOCTYPE html>
<html>
<head>
<title>Notes App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    .search-box{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}
.note-actions{
display:flex;
align-items:center;
gap:6px;
margin-top:12px;
flex-wrap:nowrap;
justify-content:flex-start;
}

.pin-btn{
font-size:20px;
text-decoration:none;
margin-right:5px;
}

.btn-view{
background:#17a2b8;
}

.btn-edit{
background:#28a745;
}

.btn-delete{
background:#dc3545;
}
.pin-btn{
    text-decoration:none;
    font-size:18px;
    color:#ff9800;
    margin-right:10px;
}

.pin-btn:hover{
    color:#e68900;
}
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAVBAR */

.navbar{
    background:#222;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-size:18px;
}

.navbar a:hover{
    color:#00d9ff;
}

.logo{
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* CONTENT */

.container{
    flex:1;
    padding:30px;
}

/* BUTTON */

.btn{
    background:linear-gradient(45deg,#007bff,#00c6ff);
    color:white;
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    text-decoration:none;
    font-size: 14px;
}

.btn:hover{
    opacity:0.9;
}

/* DASHBOARD CARDS */

.dashboard-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
}

.dash-card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.dash-card:hover{
    transform:translateY(-5px);
}

/* NOTES */

.notes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.note-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
    position:relative;
    display: flex;
    flex-direction:column;
    justify-content:space-between;
}

.note-card:hover{
    transform:translateY(-5px);
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

.note-card h3{
    margin-top:0;
}

.note-card p{
    color:#555;
}

.note-card .btn{
    margin-right:5px;
    margin-top:10px;
}


.note-actions .btn{
padding:4px 8px;
font-size:12px;
}
.btn-pin{
    background:#ff9800;
}
/* PROFILE PICTURE */

.profile-pic{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.profile-pic img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00c6ff;
}

/* FOOTER */

.footer{
    background:#222;
    color:white;
    text-align:center;
    padding:10px;
}
/* AUTH CARDS (Login & Register) */

.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
}

.auth-card{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
    width:350px;
}

.auth-card h2{
    text-align:center;
    margin-bottom:20px;
}

.auth-card input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.auth-card button{
    width:100%;
}
</style>
</head>

<body>

<!-- HEADER -->

<div class="navbar">
<div class="logo">Notes App</div>

<div>
{% if 'user' in session %}
<a href="/about">About</a>
<a href="contact">Contact</a>
<a href="/dashboard">Dashboard</a>
<a href="/addnote">Add Note</a>
<a href="/viewnotes">View Notes</a>
<a href="/logout">Logout</a>
<a href="profile">Profile</a>
{% else %}
<a href="/">Login</a>
<a href="/register">Register</a>
<a href="/about">About</a>
<a href="contact">Contact</a>
{% endif %}
</div>

</div>

<!-- CONTENT -->

<div class="container">

{% block content %}
{% endblock %}

</div>

<!-- FOOTER -->

<div class="footer">
<p>Notes Management System © 2026</p>
</div>

</body>
</html>
