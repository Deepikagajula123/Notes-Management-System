<!DOCTYPE html>
<html>
<head>
<title>Notes App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    html{
    font-size: 16px;
}

body{
    font-family: Arial;
    margin:0;
    padding:0;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-size: 1rem;
}

/* NAVBAR */
*{
    box-sizing: border-box;
}
.navbar{
    background:#222;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    width: 100%;
    box-sizing: border-box;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:5px 8px;
    font-size:0.85rem;
}

.logo{
    color:white;
    font-size:1.3rem;
    font-weight:bold;
}

/* CONTENT */

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* BUTTON */

.btn{
    background:linear-gradient(45deg,#007bff,#00c6ff);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    text-decoration:none;
    font-size:1.1rem;
    padding:12px 20px;
}

/* DASHBOARD */

.dashboard-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* NOTES */

.notes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    font-size: 1.05rem;
    padding: 20px;
}
.note-content{
    max-height:100px;
    overflow-y:auto;
    margin-bottom:10px;
}
.note-content::-webkit-scrollbar{
    width:5px;
}

.note-content::-webkit-scrollbar-thumb{
    background:#888;
    border-radius:10px;
}
.note-card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
    max-height:250px;     /* 🔥 limit height */
    overflow-y:auto; 
}

/* ACTION BUTTONS */

.note-actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.note-actions .btn{
    font-size:0.8rem;
    padding:6px 10px;
}

/* PROFILE */

.profile-pic img{
    width:120px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
}
.profile-card{
    text-align:center;
}

.profile-pic{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

/* AUTH */
.profile-form{
    display:flex;
    flex-direction:column;
    align-items:center;
}
/* ABOUT & CONTACT TEXT SIZE */

.auth-card p{
    font-size:0.9rem;   /* 🔽 smaller text */
    line-height:1.5;
}

.auth-card h2{
    font-size:1.3rem;   /* slightly smaller heading */
}
/* CENTER BUTTON */
/* CONTACT PAGE SMALL TEXT */

.auth-card label{
    font-size:0.9rem;
}

.auth-card input,
.auth-card textarea{
    font-size:0.9rem;
}

.auth-card button{
    font-size:0.9rem;
}
.center-btn{
    display:flex;
    justify-content:center;
}
.about-card p{
    font-size:0.85rem;
}
.dash-card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.dash-card:hover{
    transform:translateY(-5px);
}
.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.auth-card{
    width:100%;
    max-width:400px;
    padding:30px;
    background:white;
    border-radius:10px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

/* INPUT */

.auth-card input,
textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:6px;
    font-size: 1rem;
    padding: 12px;
    border:1px solid #ccc;
}

/* SEARCH */

.search-box{
    width:100%;
    max-width:400px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* FOOTER */

.footer{
    background:#222;
    color:white;
    text-align:center;
    padding:6px;
    font-size: 0.85rem;
    margin-top:auto;
}

/* 📱 MOBILE */

@media (max-width:768px){
    html{
        font-size: 16px;
    }
    .menu-toggle{
        display:block;
    }

    .nav-links{
        display:none;
        position:absolute;
        top:60px;
        right:0;
        width:100%;
        background:#222;
        flex-direction:column;
        text-align:left;
    }

    .nav-links a{
        padding:12px 20px;
        border-top:1px solid #444;
        width:100%;
    }
    .navbar{
        padding:10px;
    }
    .nav-links.active{
        display:flex;
    }
    .navbar a{
        font-size:1rem;   /* slightly bigger for mobile readability */
    }
}

/* 💻 TABLET */

@media (min-width:769px) and (max-width:1024px){

    html{
        font-size:17px;
    }

    .container{
        padding:25px;
    }

}

/* 🖥️ LAPTOP / DESKTOP */

@media (min-width:1025px){

    html{
        font-size:18px;
    }
    

    /* width:100%;            /* 🔥 important */
    /* box-sizing:border-box; 🔥 prevents overflow */ 


    .container{
        max-width:1300px;
    }

    .logo{
        font-size:1.3rem;
    }
    .navbar{
        padding:8px 20px;
    }
    .note-card{
        padding:15px;
        font-size:0.95rem;
    }

    .dash-card{
        padding:18px;
        font-size:0.95rem;
    }


    .navbar a{
        font-size:0.9rem;
    }
    .btn{
        padding:8px 14px;
        font-size:0.9rem;
    }

}
/* MENU BUTTON */

.menu-toggle{
    display:none;
    font-size:1.4rem;
    color:white;
    cursor:pointer;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:20px;
}


/* NAV LINKS */

.nav-links{
    display:flex;
    gap:15px;
}

/* 📱 MOBILE NAVBAR */

@media (max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        display:none;
        width:100%;
        flex-direction:column;
        background:#222;
        margin-top:10px;
    }

    .nav-links a{
        padding:12px;
        border-top:1px solid #444;
        width:100%;
    }

    .nav-links.active{
        display:flex;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="navbar">

    <div class="logo">Notes App</div>

    <!-- RIGHT SIDE -->
    <div class="nav-right">

        <!-- MENU BUTTON -->
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>

        <!-- LINKS -->
        <div class="nav-links" id="navLinks">
        {% if 'user' in session %}
            <a href="/about" onclick="toggleMenu()">About</a>
            <a href="/contact" onclick="toggleMenu()">Contact</a>
            <a href="/dashboard" onclick="toggleMenu()">Dashboard</a>
            <a href="/addnote" onclick="toggleMenu()">Add Note</a>
            <a href="/viewnotes" onclick="toggleMenu()">View Notes</a>
            <a href="/logout" onclick="toggleMenu()">Logout</a>
            <a href="/profile" onclick="toggleMenu()">Profile</a>
        {% else %}
            <a href="/" onclick="toggleMenu()">Login</a>
            <a href="/register" onclick="toggleMenu()">Register</a>
            <a href="/about" onclick="toggleMenu()">About</a>
            <a href="/contact" onclick="toggleMenu()">Contact</a>
        {% endif %}
        </div>

    </div>

</div>
<!-- CONTENT -->

<div class="container">

{% block content %}
{% endblock %}

</div>

<!-- FOOTER -->

<div class="footer">
<p>Notes Management System © 2026</p>
</div>
<script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}
</script>
</body>
</html>
