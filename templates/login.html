{% extends 'base.html' %}
{% block content %}

<div class="auth-container">

<div class="auth-card">

<h2>Login</h2>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

<form method="post">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button class="btn">Login</button>

</form>

</div>

</div>

{% endblock %}
